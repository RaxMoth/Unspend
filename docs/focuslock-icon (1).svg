<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#0E0E0E"/>

  <g clip-path="url(#iconClip)">

    <!-- Shield — clean flat shape, centered -->
    <path
      d="M512 172
         L748 258
         L748 498
         C748 652 644 756 512 836
         C380 756 276 652 276 498
         L276 258
         Z"
      fill="#181818"
      stroke="#272727"
      stroke-width="2"
    />

    <!-- Shield inner red line accent -->
    <path
      d="M512 212
         L712 290
         L712 498
         C712 632 618 726 512 798
         C406 726 312 632 312 498
         L312 290
         Z"
      fill="none"
      stroke="#E02020"
      stroke-width="1.5"
      opacity="0.5"
    />

    <!-- LOCK BODY — centered at 512,536 -->
    <!-- Body: width=176, height=148, so x=424 to 600, y=472 to 620 -->
    <rect x="424" y="476" width="176" height="148" rx="18" fill="#E02020"/>

    <!-- SHACKLE — clean hollow U shape -->
    <!-- Shackle sits centered above body -->
    <!-- outer rect from x=462 to x=562 (width 100), top at y=340 -->
    <!-- Using a path: two vertical lines + semicircle top -->
    <path
      d="M 468 476
         L 468 406
         A 44 44 0 0 1 556 406
         L 556 476"
      fill="none"
      stroke="#E02020"
      stroke-width="40"
      stroke-linecap="butt"
    />
    <!-- Cutout to hollow the shackle — same path, background color, thinner -->
    <path
      d="M 468 478
         L 468 406
         A 44 44 0 0 1 556 406
         L 556 478"
      fill="none"
      stroke="#181818"
      stroke-width="18"
      stroke-linecap="butt"
    />

    <!-- Keyhole — circle + teardrop, perfectly centered at x=512 -->
    <!-- Circle -->
    <circle cx="512" cy="538" r="20" fill="#0E0E0E"/>
    <!-- Drop -->
    <rect x="505" y="550" width="14" height="30" rx="5" fill="#0E0E0E"/>

  </g>
</svg>
